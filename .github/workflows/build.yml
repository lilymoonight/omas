name: Release

# 推送 v* tag 后全自动：测试 → 四架构构建 → 创建/更新 GitHub Release → 上传二进制。
# 发版只需：更新 CHANGELOG → commit → git tag vX.Y.Z && git push origin vX.Y.Z
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - run: npm ci
      - run: npm test
      - run: npm run typecheck

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: linux-x64
            asset: omas-linux-x64
          - runner: ubuntu-latest
            arch: linux-arm64
            asset: omas-linux-arm64
          - runner: macos-latest
            arch: darwin-arm64
            asset: omas-darwin-arm64
          - runner: macos-latest
            arch: darwin-x64
            asset: omas-darwin-x64

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends unzip ca-certificates curl

      - name: Cache Bun bootstrap
        uses: actions/cache@v5
        with:
          path: .bun
          key: bun-1.3.14-host-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('scripts/build.sh') }}

      - run: npm ci

      - name: Build ${{ matrix.arch }}
        env:
          ARCH: ${{ matrix.arch }}
        run: npm run build

      - name: Smoke test binary
        if: |
          (runner.os == 'Linux' && matrix.arch == 'linux-x64') ||
          (runner.os == 'macOS' && matrix.arch == 'darwin-arm64')
        run: ./release/omas --help

      - name: Stage release asset
        run: |
          cp release/omas "${{ matrix.asset }}"
          chmod +x "${{ matrix.asset }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Extract release notes from CHANGELOG
        run: node scripts/extract-changelog.mjs "${GITHUB_REF_NAME#v}" release-notes.md

      - name: Publish GitHub Release with binaries
        uses: softprops/action-gh-release@v3
        with:
          name: omas ${{ github.ref_name }}
          body_path: release-notes.md
          overwrite_files: true
          files: |
            dist/omas-linux-x64
            dist/omas-linux-arm64
            dist/omas-darwin-arm64
            dist/omas-darwin-x64
