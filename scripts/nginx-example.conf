# Drop into your nginx server block. Two equally good mount styles:
#
#   (A) at root:           https://shell.example.com/
#   (B) under a sub-path:  https://example.com/shell/
#
# Both work because the frontend uses purely relative URLs and hash routing.

# ---- (A) Root mount ----
server {
    listen 443 ssl http2;
    server_name shell.example.com;

    ssl_certificate     /etc/letsencrypt/live/shell.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shell.example.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:7681/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade — required for the terminal to attach.
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        # Streaming data — don't buffer or coalesce.
        proxy_buffering off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }
}

# ---- (B) Sub-path mount ----
# The trailing slash on `proxy_pass http://...:7681/;` is required so nginx
# strips `/shell/` before forwarding. The frontend will compute its API base
# from window.location and reach `/shell/api/...` correctly.
server {
    listen 443 ssl http2;
    server_name example.com;

    # …other locations…

    location /shell/ {
        proxy_pass http://127.0.0.1:7681/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        proxy_buffering off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }
}
